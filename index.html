<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LED Matrix コントローラー</title>
  <style>
    :root {
      --bg: #1C1C1C;
      --bg-deep: #151515;
      --panel: #1f1f1f;
      --panel-2: #202020;
      --accent: #8A0303;
      --text: #FFFFFF;
      --muted: #F2F2F2;
      --line: #2e2a28;
      --gold-line: #6b5b54;
      --glow: rgba(138, 3, 3, 0.25);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Yu Mincho", "Hiragino Mincho ProN", "Times New Roman", serif;
      background:
        radial-gradient(1200px 700px at 20% -10%, rgba(138, 3, 3, 0.18), transparent 60%),
        radial-gradient(900px 600px at 110% 10%, rgba(255, 255, 255, 0.04), transparent 55%),
        repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.03) 0 2px, transparent 2px 10px),
        linear-gradient(180deg, #1c1c1c 0%, #171717 100%);
      color: var(--text);
    }

    .wrap {
      max-width: 640px;
      margin: 0 auto;
      padding: 20px 14px 32px;
    }

    .title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      position: relative;
    }

    .title-badge {
      width: 10px;
      height: 34px;
      background: linear-gradient(180deg, #8a0303, #5b0202);
      clip-path: polygon(0 0, 100% 0, 100% 86%, 50% 100%, 0 86%);
      box-shadow: 0 0 10px var(--glow);
    }

    h1 {
      font-size: 22px;
      margin: 0;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .card {
      position: relative;
      background: linear-gradient(180deg, rgba(28, 28, 28, 0.95), rgba(20, 20, 20, 0.98));
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px 16px 16px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.45);
    }

    .section {
      position: relative;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 14px 12px 12px;
      margin-top: 12px;
      background: linear-gradient(180deg, rgba(32, 32, 32, 0.9), rgba(24, 24, 24, 0.95));
    }

    .section-title {
      font-size: 11px;
      color: var(--muted);
      margin: 0 0 10px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
    }

    label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: 0.08em;
    }

    input[type="text"], input[type="range"] {
      width: 100%;
    }

    input[type="text"] {
      background: #141414;
      border: 1px solid var(--line);
      color: var(--text);
      padding: 10px 12px;
      font-size: 16px;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(138, 3, 3, 0.2);
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .row > * { flex: 1; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #141414;
      color: var(--text);
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: background 0.2s ease, border-color 0.2s ease, transform 0.1s ease;
    }

    .btn-primary {
      background: linear-gradient(180deg, #8a0303, #6a0202);
      border: none;
      box-shadow: 0 10px 18px rgba(138, 3, 3, 0.25);
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--line);
    }

    .btn-toggle.active {
      border-color: var(--accent);
    }

    .btn:hover:not(:disabled),
    .btn:focus-visible:not(:disabled) {
      background: var(--bg-deep);
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .status {
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    .range-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .range-value {
      min-width: 54px;
      text-align: right;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    /* Art-deco framing */
    .card::before,
    .card::after,
    .section::before,
    .section::after {
      content: "";
      position: absolute;
      pointer-events: none;
      border-radius: 10px;
    }

    .card::before {
      inset: 6px;
      border: 1px solid var(--gold-line);
    }

    .card::after {
      inset: 12px;
      border: 1px dashed rgba(138, 3, 3, 0.4);
      border-radius: 8px;
    }

    .section::before {
      inset: 5px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .section::after {
      width: 10px;
      height: 10px;
      right: 10px;
      top: 10px;
      background: var(--accent);
      clip-path: polygon(50% 0, 100% 50%, 50% 100%, 0 50%);
      box-shadow: 0 0 10px var(--glow);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">
      <div class="title-badge"></div>
      <div>
        <h1>LED Matrix コントローラー</h1>
      </div>
    </div>

    <div class="card">
      <div class="section">
        <p class="section-title">接続</p>
        <button id="connectBtn" class="btn btn-primary">M5Stack に接続（BLE）</button>
        <div class="status" id="status">未接続</div>
      </div>

      <div class="section">
        <p class="section-title">メッセージ</p>
        <label for="messageInput">表示するテキスト</label>
        <input type="text" id="messageInput" placeholder="MESSAGE" maxlength="120" disabled>
        <div class="row" style="margin-top: 8px;">
          <button id="sendBtn" class="btn btn-primary" disabled>送信</button>
          <button id="clearBtn" class="btn btn-ghost" disabled>クリア</button>
        </div>
      </div>

      <div class="section">
        <p class="section-title">演出</p>

        <label for="speedInput">スクロール速度</label>
        <div class="range-wrap">
          <input type="range" id="speedInput" min="10" max="300" value="60" disabled>
          <div class="range-value" id="speedVal">60ms</div>
        </div>

        <label for="brightInput" style="margin-top: 12px;">輝度</label>
        <div class="range-wrap">
          <input type="range" id="brightInput" min="0" max="15" value="4" disabled>
          <div class="range-value" id="brightVal">4</div>
        </div>

        <label style="margin-top: 12px;">LED 反転</label>
        <div class="row">
          <button id="invertOff" class="btn btn-toggle active" disabled>通常</button>
          <button id="invertOn" class="btn btn-toggle" disabled>反転</button>
        </div>
      </div>

      <div class="section">
        <p class="section-title">反映</p>
        <div class="row">
          <button id="applyBtn" class="btn btn-primary" disabled>設定を反映</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
    const CHARACTERISTIC_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";

    let bleCharacteristic;
    let invertValue = 0;

    const connectBtn = document.getElementById('connectBtn');
    const sendBtn = document.getElementById('sendBtn');
    const clearBtn = document.getElementById('clearBtn');
    const applyBtn = document.getElementById('applyBtn');
    const messageInput = document.getElementById('messageInput');
    const speedInput = document.getElementById('speedInput');
    const brightInput = document.getElementById('brightInput');
    const invertOff = document.getElementById('invertOff');
    const invertOn = document.getElementById('invertOn');
    const statusDiv = document.getElementById('status');
    const speedVal = document.getElementById('speedVal');
    const brightVal = document.getElementById('brightVal');

    function setEnabled(enabled) {
      messageInput.disabled = !enabled;
      sendBtn.disabled = !enabled;
      clearBtn.disabled = !enabled;
      applyBtn.disabled = !enabled;
      speedInput.disabled = !enabled;
      brightInput.disabled = !enabled;
      invertOff.disabled = !enabled;
      invertOn.disabled = !enabled;
    }

    function setInvertButtons() {
      if (invertValue === 0) {
        invertOff.classList.add('active');
        invertOn.classList.remove('active');
      } else {
        invertOff.classList.remove('active');
        invertOn.classList.add('active');
      }
    }

    function updateRangeLabels() {
      speedVal.textContent = `${speedInput.value}ms`;
      brightVal.textContent = `${brightInput.value}`;
    }

    updateRangeLabels();

    connectBtn.addEventListener('click', async () => {
      try {
        statusDiv.textContent = "接続中...";
        const device = await navigator.bluetooth.requestDevice({
          filters: [{ services: [SERVICE_UUID] }]
        });
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);
        bleCharacteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);

        statusDiv.textContent = "接続完了";
        setEnabled(true);
      } catch (error) {
        console.error(error);
        statusDiv.textContent = "接続エラー: " + error.message;
      }
    });

    invertOff.addEventListener('click', () => {
      invertValue = 0;
      setInvertButtons();
    });

    invertOn.addEventListener('click', () => {
      invertValue = 1;
      setInvertButtons();
    });

    speedInput.addEventListener('input', updateRangeLabels);
    brightInput.addEventListener('input', updateRangeLabels);

    async function sendPayload(textOnly = false) {
      const text = messageInput.value || "";
      const speed = speedInput.value;
      const bright = brightInput.value;
      const invert = invertValue;

      let payload = "";
      if (textOnly) {
        payload = `T:${text}`;
      } else {
        payload = `T:${text};S:${speed};B:${bright};I:${invert}`;
      }

      if (bleCharacteristic) {
        const encoder = new TextEncoder();
        const data = encoder.encode(payload);
        await bleCharacteristic.writeValue(data);
        statusDiv.textContent = textOnly ? "テキスト送信済み" : "設定を反映しました";
        return;
      }

      if (location.protocol.startsWith('http')) {
        const body = new URLSearchParams({
          text,
          speed,
          brightness: bright,
          invert
        });
        await fetch('/api', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body
        });
        statusDiv.textContent = "設定を反映しました";
        return;
      }

      statusDiv.textContent = "BLE接続かAP接続で利用してください";
    }

    sendBtn.addEventListener('click', () => {
      sendPayload(true).catch(err => {
        statusDiv.textContent = "送信エラー: " + err.message;
      });
    });

    applyBtn.addEventListener('click', () => {
      sendPayload(false).catch(err => {
        statusDiv.textContent = "反映エラー: " + err.message;
      });
    });

    clearBtn.addEventListener('click', () => {
      messageInput.value = "";
    });
  </script>
</body>
</html>
