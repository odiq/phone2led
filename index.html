<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Phone2LED</title>
  <style>
    body { font-family: sans-serif; margin: 20px; }
    .card { max-width: 520px; margin: 0 auto; padding: 16px; border: 1px solid #ddd; border-radius: 10px; }
    label { display: block; margin-top: 12px; font-weight: 600; }
    input[type="text"], input[type="range"], button { width: 100%; padding: 10px; font-size: 16px; }
    .row { display: flex; gap: 10px; }
    .row > * { flex: 1; }
    #status { margin-top: 12px; color: #666; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Phone2LED Control</h2>

    <button id="connectBtn">Connect BLE (Bluefy)</button>

    <label>Text</label>
    <input type="text" id="textInput" maxlength="120" placeholder="Type text" />

    <label>Scroll Speed (ms/col)</label>
    <input type="range" id="speedInput" min="10" max="300" value="60" />

    <label>Brightness (0-15)</label>
    <input type="range" id="brightInput" min="0" max="15" value="4" />

    <label>Invert</label>
    <div class="row">
      <button id="invertOff">Normal</button>
      <button id="invertOn">Invert</button>
    </div>

    <button id="sendBtn">Send</button>
    <div id="status">Not connected</div>
  </div>

<script>
const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
const CHARACTERISTIC_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";

let bleCharacteristic = null;
let invertValue = 0;

const statusEl = document.getElementById('status');
const connectBtn = document.getElementById('connectBtn');
const sendBtn = document.getElementById('sendBtn');
const textInput = document.getElementById('textInput');
const speedInput = document.getElementById('speedInput');
const brightInput = document.getElementById('brightInput');
const invertOff = document.getElementById('invertOff');
const invertOn = document.getElementById('invertOn');

invertOff.addEventListener('click', () => { invertValue = 0; statusEl.textContent = 'Invert: off'; });
invertOn.addEventListener('click', () => { invertValue = 1; statusEl.textContent = 'Invert: on'; });

connectBtn.addEventListener('click', async () => {
  try {
    statusEl.textContent = 'Requesting BLE device...';
    const device = await navigator.bluetooth.requestDevice({
      filters: [{ services: [SERVICE_UUID] }]
    });
    statusEl.textContent = 'Connecting GATT...';
    const server = await device.gatt.connect();
    const service = await server.getPrimaryService(SERVICE_UUID);
    bleCharacteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);
    statusEl.textContent = 'BLE connected';
  } catch (err) {
    statusEl.textContent = 'BLE error: ' + err.message;
  }
});

async function sendPayload() {
  const text = textInput.value || '';
  const speed = speedInput.value;
  const bright = brightInput.value;
  const invert = invertValue;
  const payload = `T:${text};S:${speed};B:${bright};I:${invert}`;

  if (bleCharacteristic) {
    const data = new TextEncoder().encode(payload);
    await bleCharacteristic.writeValue(data);
    statusEl.textContent = 'Sent via BLE';
    return;
  }

  if (location.protocol.startsWith('http')) {
    const body = new URLSearchParams({
      text, speed, brightness: bright, invert
    });
    await fetch('/api', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body
    });
    statusEl.textContent = 'Sent via WiFi AP';
    return;
  }

  statusEl.textContent = 'Connect BLE or open this page via AP';
}

sendBtn.addEventListener('click', () => {
  sendPayload().catch(err => {
    statusEl.textContent = 'Send error: ' + err.message;
  });
});
</script>
</body>
</html>
